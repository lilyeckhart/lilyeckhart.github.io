<!DOCTYPE html>
<html>

<head>
    <title>Lily's Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans|Roboto+Mono&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Head Section -->
        <div class="intro">
            <img class="profile-picture" src="images/profile-picture.jpg" />
            <h1>Lily Eckhart</h1>
            <h3>Data Entry Clerk at The Winans Group PC, CPA</h3>
            <p class="quote">{{ Pause and Ponder }}</p>
        </div>
        <hr>
        <!-- About Section -->
        <div class="about-grid">
            <div class="i-am">
                <h3>I am</h3>
                <ul class="about-list">
                    <li>A developer</li>
                    <li>A gamer</li>
                    <li>A hobby cook</li>
                </ul>
            </div>
            <div class="i-like">
                <h3>I like to</h3>
                <ul class="about-list" <li>Read books</li>
                    <li>Hang out with my friends</li>
                    <li>Drink coffee</li>
                </ul>
            </div>
        </div>
        <hr>
        <!-- Project Section -->
        <div>
            <h3 class="project-heading">My Projects</h3>
            <div class="project-grid">
                <div class="project-image-wrapper">
                    <h4>Project 1</h4>
                    <img class="project-image" src="https://via.placeholder.com/300" />
                </div>
                <div class="project-image-wrapper">
                    <h4>Project 2</h4>
                    <img class="project-image" src="https://via.placeholder.com/300" />
                </div>
                <div class="project-image-wrapper">
                    <h4>Project 3</h4>
                    <img class="project-image" src="https://via.placeholder.com/300" />
                </div>
                <div class="project-image-wrapper">
                    <h4>Project 4</h4>
                    <img class="project-image" src="https://via.placeholder.com/300" />
                </div>
            </div>
        </div>
        <hr>
        <!-- Links to Socials -->
        <div class="links-and-contact">
            <div class="links">
                <h3>Links</h3>
                <ul class="link-list">
                    <li>
                        <a href="https://www.linkedin.com/in/lilliancornell/">LinkedIn</a>
                    </li>
                    <li>
                        <a href="https://github.com/lilyeckhart">GitHub</a>
                    </li>
                </ul>
            </div>
            <!-- Message Form -->
            <div class="contact">
                <form action="#">
                    <label for="email">
                        <h4>Email</h4>
                        <input type="email" id="email" placeholder="Enter your email" />
                    </label>
                    <label for="message">
                        <h4>Message</h4>
                        <textarea id="message" placeholder="Your message"></textarea>
                    </label>
                    <div class="submit-button-wrapper">
                        <input type="submit" valid="Send Message" id="submit-button" />
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
